<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Grain Cam – Semilla Nueva</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #app {
      max-width: 420px;
      width: 100%;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
    }

    #header h1 {
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
    }

    #status-badge {
      font-size: 12px;
      color: #666;
      background: #ebebeb;
      padding: 3px 10px;
      border-radius: 8px;
      border: 0.5px solid #ddd;
    }

    #viewfinder {
      width: 100%;
      aspect-ratio: 4/3;
      background: #1a1a1a;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      border: 0.5px solid #ccc;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas { display: none; }

    #overlay { position: absolute; inset: 0; pointer-events: none; }

    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: rgba(255,255,255,0.7);
      border-style: solid;
    }
    .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

    #flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s;
    }

    #cam-label {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    #no-cam {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }

    #no-cam i { font-size: 32px; }

    #session-card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 14px;
      padding: 0.75rem 1rem;
    }

    #session-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #session-name {
      font-size: 14px;
      color: #1a1a1a;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #session-name i { font-size: 15px; color: #888; }

    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.25rem 0;
    }

    #counter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 48px;
    }

    #count {
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1;
    }

    #count-label { font-size: 11px; color: #888; }

    #shutter {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.1s;
    }

    #shutter:active { transform: scale(0.93); background: #f0f0f0; }
    #shutter.disabled { opacity: 0.4; pointer-events: none; }

    #shutter-inner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #1a1a1a;
      opacity: 0.08;
    }

    #upload-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      min-width: 48px;
    }

    #upload-btn i { font-size: 24px; color: #888; }
    #upload-btn span { font-size: 11px; color: #888; }

    #thumb-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      min-height: 60px;
      align-items: center;
    }

    #thumb-row::-webkit-scrollbar { display: none; }

    .thumb-wrap { position: relative; flex-shrink: 0; }

    .thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      border: 0.5px solid #ddd;
      display: block;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1.5px solid #fff;
    }

    .dot-uploading { background: #EF9F27; }
    .dot-done { background: #639922; }
    .dot-error { background: #E24B4A; }

    #empty-thumbs {
      font-size: 12px;
      color: #bbb;
      width: 100%;
      text-align: center;
    }

    #drive-status {
      background: #f0f0eb;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      border: 0.5px solid #ddd;
      min-height: 40px;
    }

    #drive-status i { font-size: 16px; flex-shrink: 0; }
    #drive-status.uploading { border-color: #EF9F27; color: #854F0B; background: #FAEEDA; }
    #drive-status.success { border-color: #639922; color: #3B6D11; background: #EAF3DE; }
    #drive-status.error { border-color: #E24B4A; color: #A32D2D; background: #FCEBEB; }

    #config-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0.6rem;
      font-size: 13px;
      color: #666;
      background: none;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
    }

    #config-btn:hover { background: #f0f0eb; }

    #config-panel {
      display: none;
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 14px;
      padding: 1rem;
      gap: 12px;
      flex-direction: column;
    }

    #config-panel.open { display: flex; }

    .config-row { display: flex; flex-direction: column; gap: 4px; }

    .config-row label { font-size: 12px; color: #888; }

    .config-row input, .config-row select {
      font-size: 13px;
      padding: 8px 10px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      width: 100%;
      background: #fafafa;
      color: #1a1a1a;
    }

    .config-row input:focus, .config-row select:focus {
      outline: none;
      border-color: #888;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      padding: 0.5rem 0;
      border-top: 0.5px solid #eee;
      line-height: 1.5;
    }

    #queue-info {
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="app">

  <div id="header">
    <h1><i class="ti ti-wheat" aria-hidden="true" style="font-size:18px; margin-right:6px; vertical-align:-2px;"></i>Grain Cam</h1>
    <span id="status-badge">Iniciando...</span>
  </div>

  <div id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div id="flash"></div>
    <div id="no-cam">
      <i class="ti ti-camera-off" aria-hidden="true"></i>
      <span>Presiona el botón para activar la cámara</span>
    </div>
    <div id="cam-label">Semilla Nueva · Grain Analyzer</div>
  </div>

  <div id="session-card">
    <div id="session-label">Proyecto activo</div>
    <div id="session-name">
      <i class="ti ti-folder" aria-hidden="true"></i>
      <span id="session-text">Proyecto_001</span>
      <button id="edit-btn" onclick="toggleEdit()" title="Cambiar proyecto" style="margin-left:auto; background:none; border:none; cursor:pointer; padding:2px 6px; border-radius:6px; color:#888; font-size:13px;">
        <i class="ti ti-pencil" aria-hidden="true"></i> Cambiar
      </button>
    </div>
    <div id="edit-row" style="display:none; margin-top:8px; display:none; gap:6px; align-items:center; flex-direction:row;">
      <input type="text" id="new-project-input" placeholder="Ej: Finca_San_Juan" style="flex:1; font-size:13px; padding:7px 10px; border:0.5px solid #ccc; border-radius:8px; background:#fafafa; color:#1a1a1a; width:100%;">
      <button onclick="applyProject()" style="padding:7px 14px; font-size:13px; background:#1a1a1a; color:#fff; border:none; border-radius:8px; cursor:pointer; white-space:nowrap;">Aplicar</button>
    </div>
  </div>

  <div id="controls">
    <div id="counter-wrap">
      <span id="count">0</span>
      <span id="count-label">fotos</span>
    </div>

    <button id="shutter" aria-label="Tomar foto">
      <div id="shutter-inner"></div>
    </button>

    <button id="upload-btn" aria-label="Subir foto desde galería">
      <i class="ti ti-photo-up" aria-hidden="true"></i>
      <span>Galería</span>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </button>
  </div>

  <div id="thumb-row">
    <div id="empty-thumbs">Las fotos tomadas aparecerán aquí</div>
  </div>

  <div id="drive-status">
    <i class="ti ti-cloud" aria-hidden="true"></i>
    <span id="drive-text">Listo para subir fotos a Drive</span>
  </div>

  <div id="queue-info" style="display:none">
    <span id="queue-text"></span>
  </div>

  <button id="config-btn" onclick="toggleConfig()">
    <i class="ti ti-settings" aria-hidden="true"></i>
    Configuración de sesión
  </button>

  <div id="config-panel">
    <div class="config-row">
      <label>Nombre de proyecto</label>
      <input type="text" id="cfg-session" value="Proyecto_001" oninput="updateSession()">
    </div>
    <div class="config-row">
      <label>Resolución de captura</label>
      <select id="cfg-res">
        <option value="high" selected>Alta (recomendada para análisis)</option>
        <option value="medium">Media</option>
      </select>
    </div>
    <p class="note">Las fotos se guardan en Google Drive → GrainAnalyzer_Fotos → [nombre de proyecto]</p>
  </div>

</div>

<script>
  // ── Configuración ──────────────────────────────────────────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyD5pScmWj5G_2cgxjOjj0YtkLWNWvdG2QJgkP9hlIDS3KFx21tnREJ3Efu4_LMo6u1/exec";

  // ── Estado ─────────────────────────────────────────────────
  let photoCount = 0;
  let stream = null;
  let camActive = false;
  let uploadQueue = [];
  let isUploading = false;

  // ── Elementos ──────────────────────────────────────────────
  const video      = document.getElementById('video');
  const canvas     = document.getElementById('canvas');
  const shutter    = document.getElementById('shutter');
  const noCam      = document.getElementById('no-cam');
  const countEl    = document.getElementById('count');
  const thumbRow   = document.getElementById('thumb-row');
  const flash      = document.getElementById('flash');
  const badge      = document.getElementById('status-badge');
  const driveBox   = document.getElementById('drive-status');
  const driveText  = document.getElementById('drive-text');
  const driveIcon  = driveBox.querySelector('i');
  const queueInfo  = document.getElementById('queue-info');
  const queueText  = document.getElementById('queue-text');

  // ── Cámara ─────────────────────────────────────────────────
  async function startCamera() {
    try {
      const res = document.getElementById('cfg-res').value;
      const constraints = {
        video: {
          facingMode: 'environment',
          width:  { ideal: res === 'high' ? 3840 : 1920 },
          height: { ideal: res === 'high' ? 2160 : 1080 }
        }
      };
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      noCam.style.display = 'none';
      camActive = true;
      badge.textContent = 'Cámara activa';
    } catch (e) {
      noCam.innerHTML = '<i class="ti ti-camera-off"></i><span>Activa los permisos de cámara</span>';
      badge.textContent = 'Sin permiso';
    }
  }

  shutter.addEventListener('click', async () => {
    if (!camActive) { await startCamera(); return; }
    takePhoto();
  });

  function takePhoto() {
    const w = video.videoWidth;
    const h = video.videoHeight;
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);

    flash.style.opacity = '0.9';
    setTimeout(() => { flash.style.opacity = '0'; }, 120);

    photoCount++;
    countEl.textContent = photoCount;

    const session  = document.getElementById('cfg-session').value || 'Proyecto_001';
    const filename = `${session}_${String(photoCount).padStart(3, '0')}.jpg`;
    const dataUrl  = canvas.toDataURL('image/jpeg', 0.92);

    addThumb(dataUrl, filename);
    enqueueUpload(dataUrl, filename, session);
  }

  // ── Miniaturas ─────────────────────────────────────────────
  function addThumb(dataUrl, filename) {
    const emptyEl = document.getElementById('empty-thumbs');
    if (emptyEl) emptyEl.remove();

    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    wrap.id = 'wrap-' + filename;

    const img = document.createElement('img');
    img.src = dataUrl;
    img.className = 'thumb';
    img.alt = filename;
    img.title = filename;

    const dot = document.createElement('div');
    dot.className = 'status-dot dot-uploading';
    dot.id = 'dot-' + filename;

    wrap.appendChild(img);
    wrap.appendChild(dot);
    thumbRow.appendChild(wrap);
    thumbRow.scrollLeft = thumbRow.scrollWidth;
  }

  function setDotStatus(filename, status) {
    const dot = document.getElementById('dot-' + filename);
    if (!dot) return;
    dot.className = 'status-dot ' + (status === 'done' ? 'dot-done' : 'dot-error');
  }

  // ── Cola de subida ─────────────────────────────────────────
  function enqueueUpload(dataUrl, filename, session) {
    uploadQueue.push({ dataUrl, filename, session });
    updateQueueInfo();
    if (!isUploading) processQueue();
  }

  async function processQueue() {
    if (uploadQueue.length === 0) {
      isUploading = false;
      updateQueueInfo();
      return;
    }

    isUploading = true;
    const item = uploadQueue[0];

    setDriveStatus('uploading', `<i class="ti ti-cloud-upload"></i> Subiendo ${item.filename}...`);

    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          image:    item.dataUrl,
          filename: item.filename,
          session:  item.session
        })
      });

      const result = await response.json();

      if (result.success) {
        setDotStatus(item.filename, 'done');
        setDriveStatus('success', `<i class="ti ti-circle-check"></i> ${item.filename} guardada en Drive`);
      } else {
        throw new Error(result.error || 'Error desconocido');
      }

    } catch (err) {
      setDotStatus(item.filename, 'error');
      setDriveStatus('error', `<i class="ti ti-alert-circle"></i> Error al subir ${item.filename} — se reintentará`);
      // Reintentar al final de la cola
      uploadQueue.push(item);
    }

    uploadQueue.shift();
    updateQueueInfo();
    setTimeout(processQueue, 500);
  }

  function setDriveStatus(type, html) {
    driveBox.className = '';
    if (type) driveBox.classList.add(type);
    driveBox.innerHTML = html;
  }

  function updateQueueInfo() {
    if (uploadQueue.length > 1) {
      queueInfo.style.display = 'block';
      queueText.textContent = `${uploadQueue.length} fotos en cola`;
    } else {
      queueInfo.style.display = 'none';
    }
  }

  // ── Galería ────────────────────────────────────────────────
  document.getElementById('upload-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      photoCount++;
      countEl.textContent = photoCount;
      const session  = document.getElementById('cfg-session').value || 'Proyecto_001';
      const filename = `${session}_${String(photoCount).padStart(3, '0')}.jpg`;
      addThumb(ev.target.result, filename);
      enqueueUpload(ev.target.result, filename, session);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // ── Config ─────────────────────────────────────────────────
  function toggleConfig() {
    document.getElementById('config-panel').classList.toggle('open');
  }

  function updateSession() {
    const val = document.getElementById('cfg-session').value || 'Proyecto_001';
    document.getElementById('session-text').textContent = val;
  }

  function toggleEdit() {
    const row = document.getElementById('edit-row');
    const input = document.getElementById('new-project-input');
    const visible = row.style.display === 'flex';
    row.style.display = visible ? 'none' : 'flex';
    if (!visible) {
      input.value = document.getElementById('cfg-session').value || 'Proyecto_001';
      input.focus();
      input.select();
    }
  }

  function applyProject() {
    const input = document.getElementById('new-project-input');
    const val = input.value.trim().replace(/\s+/g, '_') || 'Proyecto_001';
    document.getElementById('cfg-session').value = val;
    document.getElementById('session-text').textContent = val;
    document.getElementById('edit-row').style.display = 'none';
    // Resetear contador para el nuevo proyecto
    photoCount = 0;
    countEl.textContent = '0';
    // Limpiar miniaturas
    thumbRow.innerHTML = '<div id="empty-thumbs">Las fotos tomadas aparecerán aquí</div>';
    setDriveStatus('', '<i class="ti ti-cloud" aria-hidden="true"></i> <span>Proyecto cambiado a: ' + val + '</span>');
  }

  // Permitir Enter en el input de proyecto
  document.getElementById('new-project-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyProject();
  });

  // ── Inicio ─────────────────────────────────────────────────
  startCamera();
</script>

</body>
</html>
